services:
  napcat:
    image: mlikiowa/napcat-docker:latest
    container_name: napcat
    restart: always
    network_mode: host
    environment:
      TZ: Asia/Shanghai
      WEBUI_TOKEN: change-me
    volumes:
      - napcat-qq-data:/app/.config/QQ
      - napcat-config:/app/napcat/config
      - ${HOME}/.config/napcat:/app/.config/napcat

volumes:
  napcat-qq-data:
  napcat-config:

